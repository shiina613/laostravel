spring.application.name=laos

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/laostravel
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly123456789
jwt.expiration=10800000

# File Upload Configuration
file.upload-dir=uploads/destinations
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
